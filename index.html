<!DOCTYPE html>
<html lang="en">
<head>

<title>SmartAIQuiz</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🧠 SmartAIQuiz</h1>
<p>Create AI Generated Quiz Instantly</p>

<div class="card">

<input type="number" id="ques" placeholder="Enter number of questions">

<input type="text" id="topic" placeholder="Enter topic (Example: Java, AI, OS)">

<button onclick="generateQuiz()">Generate Quiz</button>

</div>

<div class="result-box">

<h2>Quiz Result</h2>

<div id="result"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
